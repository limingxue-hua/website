<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单学生管理系统</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .form-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: space-between;
        }
        .form-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }
        button {
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #2980b9;
            transform: translateY(-1px);
        }
        .btn-delete {
            background-color: #e74c3c;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
        }
        .btn-delete:hover {
            background-color: #c0392b;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 15px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #3498db;
            color: white;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tbody tr:hover {
            background-color: #f8faff;
        }
        tbody tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>简单学生管理系统</h1>
    
    <!-- 添加学生表单 -->
    <form id="studentForm">
        <div class="form-group">
            <input type="text" id="stuName" placeholder="学生姓名" required>
            <input type="number" id="stuAge" placeholder="年龄" required min="1">
            <input type="text" id="stuMajor" placeholder="专业/班级" required>
            <button type="submit">添加学生</button>
        </div>
    </form>

    <!-- 学生列表展示表格 -->
    <table>
        <thead>
            <tr>
                <th>姓名</th>
                <th>年龄</th>
                <th>专业/班级</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="studentTableBody">
            <!-- 数据将通过 JS 动态渲染到这里 -->
        </tbody>
    </table>
</div>

<script>
    // 获取DOM元素
    const studentForm = document.getElementById('studentForm');
    const studentTableBody = document.getElementById('studentTableBody');

    // 从本地存储加载学生数据，如果没有则初始化为空数组
    let students = JSON.parse(localStorage.getItem('students')) || [];

    // 渲染表格
    function renderTable() {
        studentTableBody.innerHTML = ''; // 先清空现有表格内容
        students.forEach((student, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${student.name}</td>
                <td>${student.age}</td>
                <td>${student.major}</td>
                <td><button class="btn-delete" onclick="deleteStudent(${index})">删除</button></td>
            `;
            studentTableBody.appendChild(row);
        });
    }

    // 监听表单提交事件
    studentForm.addEventListener('submit', function(event) {
        event.preventDefault(); // 阻止页面默认刷新行为

        // 获取输入框的值
        const name = document.getElementById('stuName').value;
        const age = document.getElementById('stuAge').value;
        const major = document.getElementById('stuMajor').value;

        // 将新学生数据保存到数组并更新本地存储
        students.push({ name, age, major });
        localStorage.setItem('students', JSON.stringify(students));

        // 重新渲染表格
        renderTable();

        // 清空表单输入
        studentForm.reset();
    });

    // 删除学生的方法
    function deleteStudent(index) {
        students.splice(index, 1); // 从数组中移除对应的数据
        localStorage.setItem('students', JSON.stringify(students)); // 更新本地存储
        renderTable(); // 重新渲染表格
    }

    // 页面首次加载时执行一次渲染
    renderTable();
</script>

</body>
</html>
